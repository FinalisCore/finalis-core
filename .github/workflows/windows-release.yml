name: windows-release

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run finalis-tests before packaging"
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-installer:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      actions: write
    env:
      BUILD_PRESET: windows-msvc-release
      QT_VERSION: 5.15.2
      QT_ARCH: win64_msvc2019_64
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
      WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
      WINDOWS_SIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-downloads-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-downloads-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Verify system build tools
        shell: pwsh
        run: |
          cmake --version
          ninja --version

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          dir: ${{ github.workspace }}\.qt
          cache: true

      - name: Set release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.7.0-${{ github.run_number }}"
          }
          $qtDeploy = Get-ChildItem -Path "${{ github.workspace }}\.qt" -Filter windeployqt.exe -Recurse | Select-Object -First 1
          if (-not $qtDeploy) {
            throw "windeployqt.exe not found under ${{ github.workspace }}\.qt"
          }
          $qtRoot = Split-Path (Split-Path $qtDeploy.FullName -Parent) -Parent
          "version=$version" >> $env:GITHUB_OUTPUT
          "FINALIS_QT_PREFIX=$qtRoot" >> $env:GITHUB_ENV
          "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

      - name: Check signing credentials for tagged release
        if: ${{ github.ref_type == 'tag' }}
        shell: pwsh
        run: |
          if (-not "${env:WINDOWS_SIGN_PFX_BASE64}" -or -not "${env:WINDOWS_SIGN_PFX_PASSWORD}") {
            Write-Host "::warning::Signing secrets are not configured; tagged release artifacts will be published unsigned."
          }

      - name: Configure
        shell: pwsh
        run: cmake --preset $env:BUILD_PRESET

      - name: Build (with tests)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests }}
        shell: pwsh
        run: cmake --build --preset $env:BUILD_PRESET --target finalis-node finalis-lightserver finalis-explorer finalis-cli finalis-wallet finalis-tests

      - name: Build (without tests)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.run_tests }}
        shell: pwsh
        run: cmake --build --preset $env:BUILD_PRESET --target finalis-node finalis-lightserver finalis-explorer finalis-cli finalis-wallet

      - name: Import code signing certificate
        if: ${{ env.WINDOWS_SIGN_PFX_BASE64 != '' && env.WINDOWS_SIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certDir = "${{ github.workspace }}\dist\codesign"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $pfxPath = Join-Path $certDir "finalis-codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${env:WINDOWS_SIGN_PFX_BASE64}"))
          "WINDOWS_SIGN_PFX_PATH=$pfxPath" >> $env:GITHUB_ENV

      - name: Sign Windows binaries
        if: ${{ env.WINDOWS_SIGN_PFX_PATH != '' && env.WINDOWS_SIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          $timestampUrl = if ("${env:WINDOWS_SIGN_TIMESTAMP_URL}") { "${env:WINDOWS_SIGN_TIMESTAMP_URL}" } else { "http://timestamp.digicert.com" }
          $files = @(
            "${{ github.workspace }}\build\windows-release\finalis-node.exe",
            "${{ github.workspace }}\build\windows-release\finalis-lightserver.exe",
            "${{ github.workspace }}\build\windows-release\finalis-explorer.exe",
            "${{ github.workspace }}\build\windows-release\finalis-cli.exe",
            "${{ github.workspace }}\build\windows-release\finalis-wallet.exe"
          )
          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Signing target missing: $file"
            }
            & $signtool sign /fd SHA256 /td SHA256 /f "${env:WINDOWS_SIGN_PFX_PATH}" /p "${env:WINDOWS_SIGN_PFX_PASSWORD}" /tr $timestampUrl $file
            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $file"
            }
          }

      - name: Run core tests (full on tags, mainnet-focused on branch builds)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests }}
        shell: pwsh
        run: |
          $logDir = "${{ github.workspace }}\dist\test-logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $exe = "${{ github.workspace }}\build\windows-release\finalis-tests.exe"
          $exitCode = 0
          if ("${{ github.ref_type }}" -eq "tag") {
            $logPath = Join-Path $logDir "finalis-tests.log"
            & $exe 2>&1 | Tee-Object -FilePath $logPath
            $exitCode = $LASTEXITCODE
          } else {
            $filters = @(
              "characterize_mainnet",
              "mainnet_bootstrap_with_genesis",
              "reject_cross_network_mainnet_vs_testnet_handshake",
              "lightserver_parse_args_rejects_mainnet_flag",
              "api_v1",
              "explorer_partner"
            )
            foreach ($filter in $filters) {
              $safeName = ($filter -replace '[^A-Za-z0-9_.-]', '_')
              $logPath = Join-Path $logDir ("finalis-tests-" + $safeName + ".log")
              Write-Host "== Running FINALIS_TEST_FILTER=$filter =="
              $env:FINALIS_TEST_FILTER = $filter
              & $exe 2>&1 | Tee-Object -FilePath $logPath
              if ($LASTEXITCODE -ne 0) {
                $exitCode = $LASTEXITCODE
              }
            }
            Remove-Item Env:\FINALIS_TEST_FILTER -ErrorAction SilentlyContinue
          }
          Write-Host "== Failed test lines =="
          Get-ChildItem -Path $logDir -Filter "finalis-tests*.log" | ForEach-Object {
            Select-String -Path $_.FullName -Pattern '^\[fail ','^\[failed-summary\]' | ForEach-Object { $_.Line }
          }
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload full test logs
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_tests) }}
        uses: actions/upload-artifact@v4
        with:
          name: finalis-core-windows-test-logs-${{ steps.meta.outputs.version }}
          path: dist/test-logs/**
          if-no-files-found: error
          retention-days: 14

      - name: Stage Windows payload
        shell: pwsh
        run: >
          .\packaging\windows\Stage-WindowsRelease.ps1
          -BuildDir "${{ github.workspace }}\build\windows-release"
          -Configuration Release
          -StageRoot "${{ github.workspace }}\dist\windows"
          -QtRootDir "${{ env.FINALIS_QT_PREFIX }}"
          -VcpkgInstalledDir "${{ github.workspace }}\build\windows-release\vcpkg_installed\x64-windows"

      - name: Verify staged payload correctness
        shell: pwsh
        run: |
          $root = "${{ github.workspace }}\dist\windows\payload"
          $required = @(
            "app\bin\finalis-node.exe",
            "app\bin\finalis-lightserver.exe",
            "app\bin\finalis-explorer.exe",
            "app\bin\finalis-cli.exe",
            "app\bin\finalis-wallet.exe",
            "app\scripts\Start-Finalis.ps1",
            "app\WINDOWS-RUN.txt",
            "app\mainnet\SEEDS.json",
            "installer-assets\finalis-wizard.bmp",
            "installer-assets\finalis-wizard-small.bmp",
            "installer-assets\finalis-app.ico"
          )
          foreach ($rel in $required) {
            $full = Join-Path $root $rel
            if (-not (Test-Path $full)) {
              throw "Staged payload missing required file: $full"
            }
          }

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: packaging/windows/finalis-core.iss
          options: >
            /DMyAppVersion=${{ steps.meta.outputs.version }}
            /DSourceDir=${{ github.workspace }}\dist\windows\payload
            /DOutputDir=${{ github.workspace }}\dist\installer

      - name: Sign installer
        if: ${{ env.WINDOWS_SIGN_PFX_PATH != '' && env.WINDOWS_SIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          $timestampUrl = if ("${env:WINDOWS_SIGN_TIMESTAMP_URL}") { "${env:WINDOWS_SIGN_TIMESTAMP_URL}" } else { "http://timestamp.digicert.com" }
          $installer = "${{ github.workspace }}\dist\installer\finalis-core_installer.exe"
          if (-not (Test-Path $installer)) {
            throw "Installer missing: $installer"
          }
          & $signtool sign /fd SHA256 /td SHA256 /f "${env:WINDOWS_SIGN_PFX_PATH}" /p "${env:WINDOWS_SIGN_PFX_PASSWORD}" /tr $timestampUrl $installer
          if ($LASTEXITCODE -ne 0) {
            throw "signtool failed for installer"
          }

      - name: Upload staged payload
        uses: actions/upload-artifact@v4
        with:
          name: finalis-core-windows-payload-${{ steps.meta.outputs.version }}
          path: dist/windows/payload

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: finalis-core-installer-${{ steps.meta.outputs.version }}
          path: dist/installer/finalis-core_installer.exe

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: finalis-core-installer-${{ needs.build-installer.outputs.version }}
          path: dist/installer

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Finalis Core ${{ github.ref_name }}
          files: dist/installer/finalis-core_installer.exe
          generate_release_notes: true
