name: finalis-wallet-packaging

on:
  push:
    branches-ignore:
      - "windows-installer-test"
    paths:
      - "apps/finalis-wallet/**"
      - "docs/REFERENCE_WALLET_SPEC.md"
      - "docs/REFERENCE_WALLET_INSTALL.md"
      - "docs/SELFCOIN_CORE_CURRENT_BEHAVIOR.md"
      - "packaging/linux/**"
      - "scripts/package_reference_wallet.sh"
      - "scripts/verify_wallet_release.sh"
      - "CMakeLists.txt"
      - ".github/workflows/finalis-wallet-packaging.yml"
  pull_request:
    branches-ignore:
      - "windows-installer-test"
    paths:
      - "apps/finalis-wallet/**"
      - "docs/REFERENCE_WALLET_SPEC.md"
      - "docs/REFERENCE_WALLET_INSTALL.md"
      - "docs/SELFCOIN_CORE_CURRENT_BEHAVIOR.md"
      - "packaging/linux/**"
      - "scripts/package_reference_wallet.sh"
      - "scripts/verify_wallet_release.sh"
      - "CMakeLists.txt"
      - ".github/workflows/finalis-wallet-packaging.yml"

jobs:
  package-wallet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            qtbase5-dev \
            libssl-dev \
            libsodium-dev \
            librocksdb-dev

      - name: Package reference wallet
        run: |
          chmod +x scripts/package_reference_wallet.sh
          ./scripts/package_reference_wallet.sh

      - name: Verify release artifacts
        run: |
          shopt -s nullglob
          test -f build/release/SHA256SUMS.txt
          test -f build/release/manifest.txt
          test -f build/release/RELEASE_NOTES.md
          tgz=(build/release/finalis-wallet-*-Linux.tar.gz)
          zip=(build/release/finalis-wallet-*-Linux.zip)
          [[ ${#tgz[@]} -ge 1 ]]
          [[ ${#zip[@]} -ge 1 ]]

      - name: Verify release manifest and checksums
        run: |
          chmod +x scripts/verify_wallet_release.sh
          ./scripts/verify_wallet_release.sh build/release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finalis-wallet-release
          path: build/release/*
